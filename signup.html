<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/general.css">
  <link rel="stylesheet" href="styles/login.css">
  <link rel="stylesheet" href="styles/profile.css">

</head>

<body>
  <div class="header-container">
    <div class="left-section">
      <a class="amazon-link header-link" href="index.html">
        <img class="amazon-logo" src="images/amazon-logo-white.png">
        <img class="amazon-mobile-logo" src="images/amazon-mobile-logo-white.png">
      </a>
    </div>

    <div class="middle-section">
      <div class="header-center-title">Create account</div>
    </div>

    <div class="right-section">
      <div id="header-profile" class="header-profile"></div>
    </div>
  </div>


  <div class="login-page">
    <div class="login-card">
      <div class="login-title">Create your account</div>
      <div class="login-subtitle">Sign up to track orders and manage your cart.</div>

      <form class="js-signup-form" autocomplete="off">
        <label class="input-group">
          <div class="input-label">Email</div>
          <input class="form-input" type="email" name="email" required placeholder="you@example.com" />
        </label>

        <label class="input-group">
          <div class="input-label">Password</div>
          <input class="form-input" type="password" name="password" required placeholder="Create a password" />
        </label>

        <label class="input-group">
          <div class="input-label">Full name (optional)</div>
          <input class="form-input" type="text" name="fullName" placeholder="Your name" />
        </label>

        <button class="login-btn" type="submit">Sign up</button>

        <div class="login-error js-signup-error" role="alert" hidden></div>
      </form>

      <div class="signup-success js-signup-success" hidden>
        <div class="success-title">Account created</div>
        <div class="success-subtitle">You can now login with your email.</div>
        <a class="link-primary" href="login.html">Go to Login</a>
      </div>

      <div class="login-history" hidden>
        <div class="login-history-title">Login history (local)</div>
        <div class="login-history-list js-login-history"></div>
      </div>
    </div>
  </div>

  <script type="module" src="scripts/login.js"></script>
  <script type="module" src="scripts/profile.js"></script>
</body>

</html>
